<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사진 미션 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --gold:#C8880A; --gold-bg:#FFFBF0; --gold-border:#EED080; --gold-bar:#ECA820;
  --silver:#9CA3AF; --bronze:#B07040;
  --bg:#F5F5F3; --surface:#FFFFFF; --border:#E8E8E6;
  --text:#111111; --text-2:#555555; --text-3:#AAAAAA;
  --danger:#DC2626; --danger-bg:#FEF2F2; --danger-border:#FECACA;
  --radius:16px; --shadow:0 1px 3px rgba(0,0,0,.05),0 0 0 1px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:40px 20px 80px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:960px;margin:0 auto;}

/* HEADER */
.header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:32px;}
.header h1{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.header p{font-size:13px;color:var(--text-3);margin-top:3px;}
.prize-badge{font-size:12px;font-weight:600;padding:6px 14px;border-radius:100px;background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border);white-space:nowrap;}

/* TABS */
.tab-row{display:flex;gap:4px;margin-bottom:24px;flex-wrap:wrap;align-items:center;}
.tab-btn{font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;padding:7px 16px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.tab-btn:hover{border-color:#bbb;color:var(--text);}
.tab-btn.active{background:var(--text);color:#fff;border-color:var(--text);}
.tab-add{font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;padding:7px 14px;border-radius:100px;border:1px dashed var(--gold-border);background:var(--gold-bg);color:var(--gold);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;margin-left:4px;}
.tab-add:hover{background:#FEF3D0;}
.tab-add.active{background:var(--gold);color:#fff;border-color:var(--gold);border-style:solid;}

/* CARD */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:16px;}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.card-title-right{font-size:12px;font-weight:400;color:var(--text-3);}

/* FORM */
.field{margin-bottom:16px;}
.field-label{font-size:12px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
.name-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px;}
input[type=text],select{background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;padding:9px 12px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s;}
input[type=text]:focus,select:focus{border-color:var(--gold-bar);box-shadow:0 0 0 3px rgba(236,168,32,.12);}
input[type=text]::placeholder{color:var(--text-3);}
select{appearance:none;cursor:pointer;}

/* IMAGE UPLOAD */
.img-upload-area{border:1.5px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden;}
.img-upload-area:hover{border-color:var(--gold-bar);background:var(--gold-bg);}
.img-upload-area.has-image{padding:0;border-style:solid;border-color:var(--gold-border);}
.img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-label{font-size:13px;color:var(--text-3);pointer-events:none;}
.upload-label span{display:block;font-size:22px;margin-bottom:6px;}
.img-preview{width:100%;height:160px;object-fit:cover;border-radius:10px;display:block;pointer-events:none;}
.img-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:100px;font-size:11px;padding:3px 10px;cursor:pointer;font-family:inherit;z-index:2;}

/* BUTTONS */
.btn{font-family:'Noto Sans KR',sans-serif;border:none;border-radius:10px;padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-dark{background:#111;color:#fff;}
.btn-dark:hover:not(:disabled){opacity:.8;}
.btn-sm{font-size:13px;padding:8px 16px;font-weight:500;}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text-3);font-weight:400;}
.btn-outline:hover:not(:disabled){border-color:#bbb;color:var(--text-2);}
.btn-danger{background:none;border:1px solid var(--danger-border);color:var(--danger);font-size:12px;padding:6px 12px;font-weight:500;border-radius:8px;}
.btn-danger:hover{background:var(--danger-bg);}

/* ALERT */
.alert{border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;}
.alert-error{background:var(--danger-bg);border:1px solid var(--danger-border);color:var(--danger);}
.alert-success{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:16px;}
.stat{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;}
.stat-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--text);}

/* CHECKIN */
.checkin-header{display:flex;align-items:center;justify-content:space-between;}
.date-label{font-size:12px;color:var(--text-3);}
.divider{height:1px;background:var(--border);margin:14px 0;}
.checkin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;}
.ci-btn{background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text-2);font-family:inherit;font-size:13px;font-weight:500;padding:9px 10px;text-align:center;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;-webkit-tap-highlight-color:transparent;}
.ci-btn:hover{border-color:var(--gold-bar);color:var(--text);}
.ci-btn.done{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold);font-weight:700;}

/* TEAM OVERVIEW */
.team-overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.tscard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s;-webkit-tap-highlight-color:transparent;}
.tscard:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px);}
.tscard-img{width:100%;height:120px;object-fit:cover;display:block;background:var(--bg);}
.tscard-img-placeholder{width:100%;height:120px;background:linear-gradient(135deg,#F5F5F3 0%,#EBEBEB 100%);display:flex;align-items:center;justify-content:center;font-size:32px;}
.tscard-body{padding:16px;}
.tscard-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.tscard-sub{font-size:12px;color:var(--text-3);margin-bottom:12px;}
.tscard-track{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.tscard-fill{height:100%;border-radius:2px;background:var(--gold-bar);transition:width .5s;}
.tscard-stats{display:flex;justify-content:space-between;font-size:12px;color:var(--text-3);}
.tscard-stats strong{color:var(--text);font-size:17px;font-weight:700;}
.tscard-leader{font-size:11px;color:var(--text-3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.tscard-leader b{color:var(--gold);}

/* RANK CARDS */
.section-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:14px;font-weight:700;}
.section-note{font-size:12px;color:var(--text-3);}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;transition:box-shadow .2s,transform .15s;}
.tc:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);transform:translateY(-2px);}
.tc.r1{border-color:#EEC840;} .tc.r2{border-color:#C0C8D0;} .tc.r3{border-color:#C8A070;}
.rank-tag{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;}
.rt1{background:#FFFBF0;color:#906000;} .rt2{background:#F3F4F6;color:#6B7280;}
.rt3{background:#FFF5EC;color:#92400E;} .rt-top{background:#EFF6FF;color:#1E40AF;}
.tc-name{font-size:15px;font-weight:700;padding-right:56px;margin-bottom:2px;}
.tc-sub{font-size:12px;color:var(--text-3);margin-bottom:14px;}
.track{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:10px;}
.fill{height:100%;border-radius:3px;background:var(--gold-bar);transition:width .5s;}
.r2 .fill{background:var(--silver);} .r3 .fill{background:var(--bronze);}
.count-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;}
.count-big{font-size:26px;font-weight:700;letter-spacing:-1px;}
.count-pct{font-size:12px;color:var(--text-3);}
.bars{display:flex;flex-wrap:wrap;gap:2px;}
.b{width:10px;height:12px;border-radius:2px;background:var(--bg);border:1px solid var(--border);}
.b.on{background:var(--gold-bar);border-color:#C08810;}
.r2 .b.on{background:var(--silver);border-color:#8A9199;} .r3 .b.on{background:var(--bronze);border-color:#906030;}
.bar-label{font-size:10px;color:var(--text-3);margin-top:5px;}

/* MANAGE */
.team-list{display:flex;flex-direction:column;gap:8px;}
.team-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;}
.team-row-thumb{width:40px;height:40px;border-radius:8px;background:var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;}
.team-row-thumb img{width:100%;height:100%;object-fit:cover;}
.team-row-info{flex:1;}
.team-row-name{font-size:14px;font-weight:500;}
.team-row-count{font-size:12px;color:var(--text-3);}

/* LOADING */
.loading{text-align:center;padding:80px 20px;color:var(--text-3);font-size:14px;}
.dots{display:inline-flex;gap:5px;margin-bottom:12px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text-3);animation:blink 1.2s ease infinite;}
.dot:nth-child(2){animation-delay:.2s;} .dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:#111;color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:100px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.tip{font-size:12px;color:var(--text-3);margin-top:10px;}
.empty{text-align:center;padding:48px 20px;font-size:14px;color:var(--text-3);line-height:1.8;}
.footer{display:flex;justify-content:center;margin-top:32px;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.row{display:flex;gap:8px;align-items:flex-start;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>사진 미션 대시보드</h1>
      <p>4주 28일 · 매일 학급 사진 1장 업로드</p>
    </div>
    <div class="prize-badge">🏆 상위 5명 시상</div>
  </div>
  <div class="tab-row" id="tabRow"></div>
  <div id="pageContent"></div>
</div>
<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://bodkoynkfhlgfvnklncd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvZGtveW5rZmhsZ2Z2bmtsbmNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDc2MDUsImV4cCI6MjA5MDEyMzYwNX0.xM1YHV8jmXe45gfBdPT15WjjlFihbDYnsFko5NLjj1U';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const TOTAL = 28;
const BUCKET = 'team-images';

let teams = [], teachers = [], checkins = [];
let activeTab = 'all';
let pendingImageFile = null;

/* ─── UTILS ─── */
const todayStr = () => new Date().toISOString().slice(0,10);

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
function showAlert(id, type, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<div class="alert alert-${type}"><span>${type==='error'?'⚠️':'✓'}</span><span>${msg}</span></div>`;
}
function clearAlert(id) { const el=document.getElementById(id); if(el) el.innerHTML=''; }

const getCount = id => checkins.filter(c => c.teacher_id === id).length;
const isDone   = id => checkins.some(c => c.teacher_id === id && c.check_date === todayStr());
const teamOf   = tid => teachers.filter(t => t.team_id === tid);

/* ─── LOAD ─── */
async function loadData() {
  document.getElementById('pageContent').innerHTML =
    '<div class="loading"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div>불러오는 중...</div></div>';

  const [{data:te,error:e1},{data:tc,error:e2},{data:ch,error:e3}] = await Promise.all([
    sb.from('teams').select('*').order('created_at'),
    sb.from('teachers').select('*').order('created_at'),
    sb.from('checkins').select('*')
  ]);
  if (e1||e2||e3) {
    document.getElementById('pageContent').innerHTML =
      `<div class="alert alert-error"><span>⚠️</span><span>불러오기 실패: ${(e1||e2||e3).message}</span></div>`;
    return;
  }
  teams=te||[]; teachers=tc||[]; checkins=ch||[];
  renderTabs(); renderPage();
}

/* ─── TABS ─── */
function renderTabs() {
  const tabs = [
    {id:'all', label:'전체 현황', cls:'tab-btn'},
    ...teams.map(t => ({id:t.id, label:t.name, cls:'tab-btn'})),
    {id:'setup',  label:'+ 팀 등록', cls:'tab-add'},
    {id:'manage', label:'관리',      cls:'tab-btn'},
  ];
  document.getElementById('tabRow').innerHTML = tabs.map(t =>
    `<button type="button" class="${t.cls}${activeTab===t.id?' active':''}" data-tab="${t.id}">${t.label}</button>`
  ).join('');
}

function switchTab(id) { activeTab=id; renderTabs(); renderPage(); }

function renderPage() {
  if (activeTab==='all')    return renderAll();
  if (activeTab==='setup')  return renderSetup();
  if (activeTab==='manage') return renderManage();
  renderTeam(activeTab);
}

/* ─── 전체 현황 ─── */
function renderAll() {
  const todayUploads = teachers.filter(t=>isDone(t.id)).length;
  let html = `<div class="stats-row">
    <div class="stat"><div class="stat-label">오늘 업로드</div><div class="stat-val">${todayUploads}</div></div>
    <div class="stat"><div class="stat-label">누적 업로드</div><div class="stat-val">${checkins.length}</div></div>
    <div class="stat"><div class="stat-label">팀 수</div><div class="stat-val">${teams.length}</div></div>
    <div class="stat"><div class="stat-label">총 선생님</div><div class="stat-val">${teachers.length}</div></div>
  </div>`;
  if (!teams.length) {
    html += '<div class="empty">아직 팀이 없어요.<br>"+ 팀 등록" 버튼으로 팀을 만들어보세요!</div>';
  } else {
    html += '<div class="team-overview-grid">' + teams.map(team => {
      const tm=teamOf(team.id);
      const total=tm.reduce((s,t)=>s+getCount(t.id),0);
      const pct=tm.length?Math.round(total/(tm.length*TOTAL)*100):0;
      const todayDone=tm.filter(t=>isDone(t.id)).length;
      const leader=[...tm].sort((a,b)=>getCount(b.id)-getCount(a.id))[0];
      const imgEl=team.image_url
        ? `<img class="tscard-img" src="${team.image_url}" alt="">`
        : `<div class="tscard-img-placeholder">🏫</div>`;
      return `<div class="tscard" data-team="${team.id}">
        ${imgEl}
        <div class="tscard-body">
          <div class="tscard-name">${team.name}</div>
          <div class="tscard-sub">교사 ${tm.length}명 · 오늘 ${todayDone}명 업로드</div>
          <div class="tscard-track"><div class="tscard-fill" style="width:${pct}%"></div></div>
          <div class="tscard-stats"><span>팀 누적 <strong>${total}</strong></span><span>${pct}%</span></div>
          ${leader?`<div class="tscard-leader">현재 1위 <b>${leader.name}</b> (${getCount(leader.id)}일)</div>`:''}
        </div>
      </div>`;
    }).join('') + '</div>';
  }
  document.getElementById('pageContent').innerHTML = html;
}

/* ─── 팀별 뷰 ─── */
function renderTeam(teamId) {
  const team=teams.find(t=>t.id===teamId); if(!team) return;
  const tm=teamOf(teamId);
  const ranked=[...tm].sort((a,b)=>getCount(b.id)-getCount(a.id));
  const d=new Date();

  const ciHtml=ranked.map(t=>{
    const done=isDone(t.id);
    return `<button type="button" class="ci-btn${done?' done':''}" data-checkin="${t.id}">
      ${done?'<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
      ${t.name}
    </button>`;
  }).join('');

  const cardHtml=ranked.map((t,i)=>{
    const rank=i+1,cnt=getCount(t.id),pct=Math.round(cnt/TOTAL*100);
    const rc=rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
    const rt=rank===1?'rt1':rank===2?'rt2':rank===3?'rt3':rank<=5?'rt-top':'';
    const rl=rank===1?'🥇 1위':rank===2?'🥈 2위':rank===3?'🥉 3위':rank<=5?`TOP ${rank}`:'';
    const bars=Array.from({length:TOTAL},(_,j)=>`<div class="b${j<cnt?' on':''}"></div>`).join('');
    return `<div class="tc ${rc}">
      ${rl?`<div class="rank-tag ${rt}">${rl}</div>`:''}
      <div class="tc-name">${t.name}</div>
      <div class="tc-sub">골드바 ${cnt}개</div>
      <div class="track"><div class="fill" style="width:${cnt===0?0:Math.max(3,pct)}%"></div></div>
      <div class="count-row"><span class="count-big">${cnt}</span><span class="count-pct">${pct}%</span></div>
      <div class="bars">${bars}</div>
      <div class="bar-label">${cnt} / ${TOTAL}일</div>
    </div>`;
  }).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="stats-row">
      <div class="stat"><div class="stat-label">오늘 업로드</div><div class="stat-val">${tm.filter(t=>isDone(t.id)).length}</div></div>
      <div class="stat"><div class="stat-label">팀 누적</div><div class="stat-val">${tm.reduce((s,t)=>s+getCount(t.id),0)}</div></div>
      <div class="stat"><div class="stat-label">팀원 수</div><div class="stat-val">${tm.length}</div></div>
      <div class="stat"><div class="stat-label">미션 기간</div><div class="stat-val">28일</div></div>
    </div>
    <div class="card">
      <div class="checkin-header">
        <div class="card-title" style="margin-bottom:0;">오늘 체크인</div>
        <div class="date-label">${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}</div>
      </div>
      <div class="divider"></div>
      <div class="checkin-grid">${ciHtml}</div>
    </div>
    <div class="section-row">
      <div class="section-title">골드바 순위</div>
      <div class="section-note">누적 업로드 기준 자동 정렬</div>
    </div>
    <div class="cards-grid">${cardHtml}</div>
    <div class="footer"><button type="button" class="btn btn-outline btn-sm" data-tab="all">← 전체 현황으로</button></div>`;
}

async function toggleCheckin(id) {
  if (isDone(id)) {
    const {error}=await sb.from('checkins').delete().eq('teacher_id',id).eq('check_date',todayStr());
    if(error){toast('오류: '+error.message);return;}
    checkins=checkins.filter(c=>!(c.teacher_id===id&&c.check_date===todayStr()));
  } else {
    const {data,error}=await sb.from('checkins').insert({teacher_id:id,check_date:todayStr()}).select();
    if(error){toast('오류: '+error.message);return;}
    checkins=[...checkins,...data];
    toast('✓ 체크 완료!');
  }
  renderPage();
}

/* ─── 팀 등록 ─── */
function renderSetup() {
  pendingImageFile=null;
  document.getElementById('pageContent').innerHTML = `
    <div class="card">
      <div class="card-title">새 팀 등록</div>
      <div id="setupAlert"></div>
      <div class="field">
        <div class="field-label">① 팀 이름</div>
        <input type="text" id="teamNameInput" placeholder="예: 1팀, 햇살팀, 서울지구...">
      </div>
      <div class="field">
        <div class="field-label">② 팀 이미지 (선택)</div>
        <div class="img-upload-area" id="uploadArea">
          <input type="file" id="imgFileInput" accept="image/*">
          <div class="upload-label"><span>🖼️</span>클릭하거나 드래그해서 이미지 등록</div>
        </div>
      </div>
      <button type="button" class="btn btn-dark" id="saveTeamBtn">팀 만들기</button>
    </div>

    <div class="card">
      <div class="card-title">선생님 등록</div>
      <div id="teacherAlert"></div>
      <div class="field">
        <div class="field-label">① 팀 선택</div>
        <select id="teamSelect">
          <option value="">팀을 선택하세요...</option>
          ${teams.map(t=>`<option value="${t.id}">${t.name} (현재 ${teamOf(t.id).length}명)</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <div class="field-label">② 선생님 이름 입력 (최대 10명)</div>
        <div class="name-grid" id="nameGrid">
          ${Array.from({length:10},(_,i)=>`<input type="text" placeholder="${i+1}번 선생님">`).join('')}
        </div>
      </div>
      <button type="button" class="btn btn-dark" id="saveTeachersBtn">선생님 등록</button>
    </div>
    <p class="tip" style="text-align:center;">데이터는 Supabase DB에 저장되어 모든 기기에서 공유됩니다.</p>`;

  // 이미지 파일 input 이벤트는 직접 바인딩
  document.getElementById('imgFileInput').addEventListener('change', onImageSelected);
}

function onImageSelected(e) {
  const file=e.target.files[0]; if(!file) return;
  if(file.size>5*1024*1024){showAlert('setupAlert','error','5MB 이하 파일만 가능해요.');return;}
  pendingImageFile=file;
  const reader=new FileReader();
  reader.onload=ev=>{
    const area=document.getElementById('uploadArea');
    area.classList.add('has-image');
    area.innerHTML=`<img class="img-preview" src="${ev.target.result}">
      <button type="button" class="img-remove" id="removeImgBtn">✕ 제거</button>`;
    document.getElementById('removeImgBtn').addEventListener('click', e=>{
      e.stopPropagation(); pendingImageFile=null;
      area.classList.remove('has-image');
      area.innerHTML=`<input type="file" id="imgFileInput" accept="image/*">
        <div class="upload-label"><span>🖼️</span>클릭하거나 드래그해서 이미지 등록</div>`;
      document.getElementById('imgFileInput').addEventListener('change', onImageSelected);
    });
  };
  reader.readAsDataURL(file);
}

async function uploadImage(file, teamId) {
  const ext=file.name.split('.').pop();
  const path=`${teamId}.${ext}`;
  const {error}=await sb.storage.from(BUCKET).upload(path,file,{upsert:true});
  if(error) throw new Error('이미지 업로드 실패: '+error.message);
  return sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
}

async function saveTeam() {
  clearAlert('setupAlert');
  const name=(document.getElementById('teamNameInput').value||'').trim();
  if(!name){showAlert('setupAlert','error','팀 이름을 입력해주세요.');return;}
  const btn=document.getElementById('saveTeamBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 저장 중...';
  try {
    const {data:newTeam,error}=await sb.from('teams').insert({name}).select().single();
    if(error){
      showAlert('setupAlert','error',error.code==='23505'?`"${name}"은 이미 있는 팀 이름이에요.`:error.message);
      return;
    }
    if(pendingImageFile){
      const url=await uploadImage(pendingImageFile,newTeam.id);
      await sb.from('teams').update({image_url:url}).eq('id',newTeam.id);
      newTeam.image_url=url;
    }
    teams=[...teams,newTeam]; pendingImageFile=null;
    toast(`"${name}" 팀 생성 완료!`);
    activeTab=newTeam.id;
    renderTabs(); renderSetup();
    const sel=document.getElementById('teamSelect');
    if(sel) sel.innerHTML='<option value="">팀을 선택하세요...</option>'+
      teams.map(t=>`<option value="${t.id}"${t.id===newTeam.id?' selected':''}>${t.name} (현재 ${teamOf(t.id).length}명)</option>`).join('');
  } catch(err){showAlert('setupAlert','error',err.message);}
  finally{btn.disabled=false;btn.innerHTML='팀 만들기';}
}

async function saveTeachers() {
  clearAlert('teacherAlert');
  const teamId=(document.getElementById('teamSelect').value||'').trim();
  if(!teamId){showAlert('teacherAlert','error','팀을 먼저 선택해주세요.');return;}
  const names=Array.from(document.querySelectorAll('#nameGrid input')).map(i=>i.value.trim()).filter(Boolean);
  if(!names.length){showAlert('teacherAlert','error','선생님 이름을 입력해주세요.');return;}
  const existing=teamOf(teamId);
  if(existing.length+names.length>10){
    showAlert('teacherAlert','error',`최대 10명까지 가능해요. (현재 ${existing.length}명, 추가 가능 ${10-existing.length}명)`);return;
  }
  const dups=names.filter(n=>existing.some(t=>t.name===n));
  if(dups.length){showAlert('teacherAlert','error','이미 등록된 이름: '+dups.join(', '));return;}
  const btn=document.getElementById('saveTeachersBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 저장 중...';
  try {
    const {data,error}=await sb.from('teachers').insert(names.map(n=>({name:n,team_id:teamId}))).select();
    if(error){showAlert('teacherAlert','error',error.code==='23505'?'이미 등록된 이름이 있어요.':error.message);return;}
    teachers=[...teachers,...data];
    showAlert('teacherAlert','success',`${names.length}명 등록 완료!`);
    document.querySelectorAll('#nameGrid input').forEach(i=>i.value='');
    const sel=document.getElementById('teamSelect');
    if(sel) Array.from(sel.options).forEach(o=>{
      if(o.value){const t=teams.find(t=>t.id===o.value);if(t)o.textContent=`${t.name} (현재 ${teamOf(t.id).length}명)`;}
    });
    renderTabs();
  } catch(err){showAlert('teacherAlert','error',err.message);}
  finally{btn.disabled=false;btn.innerHTML='선생님 등록';}
}

/* ─── 관리 ─── */
function renderManage() {
  document.getElementById('pageContent').innerHTML = `
    <div class="card">
      <div class="card-title">팀 관리 <span class="card-title-right">총 ${teams.length}팀</span></div>
      ${!teams.length ? '<div class="empty">등록된 팀이 없어요.</div>' :
        '<div class="team-list">'+teams.map(t=>{
          const cnt=teamOf(t.id).length;
          const upl=teamOf(t.id).reduce((s,tc)=>s+getCount(tc.id),0);
          const thumb=t.image_url
            ?`<div class="team-row-thumb"><img src="${t.image_url}" alt=""></div>`
            :`<div class="team-row-thumb">🏫</div>`;
          return `<div class="team-row">
            ${thumb}
            <div class="team-row-info">
              <div class="team-row-name">${t.name}</div>
              <div class="team-row-count">교사 ${cnt}명 · 누적 ${upl}개</div>
            </div>
            <button type="button" class="btn btn-danger" data-delete-team="${t.id}" data-delete-name="${t.name}">삭제</button>
          </div>`;
        }).join('')+'</div>'}
    </div>
    <div class="card">
      <div class="card-title">전체 초기화</div>
      <p style="font-size:13px;color:var(--text-2);margin-bottom:16px;">모든 팀, 선생님, 체크인 기록이 삭제됩니다.</p>
      <button type="button" class="btn btn-danger btn-sm" id="resetAllBtn">전체 데이터 초기화</button>
    </div>`;
}

async function deleteTeam(id,name) {
  if(!confirm(`"${name}" 팀과 소속 선생님, 체크인 기록을 모두 삭제할까요?`)) return;
  const tIds=teamOf(id).map(t=>t.id);
  try {
    if(tIds.length) await sb.from('checkins').delete().in('teacher_id',tIds);
    await sb.from('teachers').delete().eq('team_id',id);
    const team=teams.find(t=>t.id===id);
    if(team?.image_url){const p=team.image_url.split('/').pop();await sb.storage.from(BUCKET).remove([p]);}
    await sb.from('teams').delete().eq('id',id);
    teams=teams.filter(t=>t.id!==id);
    teachers=teachers.filter(t=>t.team_id!==id);
    checkins=checkins.filter(c=>!tIds.includes(c.teacher_id));
    toast(`"${name}" 삭제 완료`);
    activeTab='manage'; renderTabs(); renderManage();
  } catch(err){toast('삭제 실패: '+err.message);}
}

async function resetAll() {
  if(!confirm('전체 초기화할까요? 모든 데이터가 삭제됩니다.')) return;
  try {
    await sb.from('checkins').delete().neq('id','00000000-0000-0000-0000-000000000000');
    await sb.from('teachers').delete().neq('id','00000000-0000-0000-0000-000000000000');
    await sb.from('teams').delete().neq('id','00000000-0000-0000-0000-000000000000');
    teams=[];teachers=[];checkins=[];
    toast('초기화 완료'); activeTab='all'; renderTabs(); renderPage();
  } catch(err){toast('초기화 실패: '+err.message);}
}

/* ─── 이벤트 위임 (단일 리스너) ─── */
document.addEventListener('click', function(e) {
  const el = e.target;

  // 탭 버튼
  const tabBtn = el.closest('[data-tab]');
  if (tabBtn) { switchTab(tabBtn.dataset.tab); return; }

  // 팀 카드 클릭 (전체 현황)
  const tscard = el.closest('[data-team]');
  if (tscard) { switchTab(tscard.dataset.team); return; }

  // 체크인 버튼
  const ciBtn = el.closest('[data-checkin]');
  if (ciBtn) { toggleCheckin(ciBtn.dataset.checkin); return; }

  // 팀 삭제 버튼
  const delBtn = el.closest('[data-delete-team]');
  if (delBtn) { deleteTeam(delBtn.dataset.deleteTeam, delBtn.dataset.deleteName); return; }

  // 팀 만들기 버튼
  if (el.closest('#saveTeamBtn')) { saveTeam(); return; }

  // 선생님 등록 버튼
  if (el.closest('#saveTeachersBtn')) { saveTeachers(); return; }

  // 전체 초기화 버튼
  if (el.closest('#resetAllBtn')) { resetAll(); return; }
});

loadData();
</script>
